services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: akari
      POSTGRES_PASSWORD: akariaja
      POSTGRES_DB: akaribot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akari -d akaribot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    ports:
      - "3939:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://akari:akari_secret_db_2024@postgres:5432/akaribot
      NODE_ENV: production
      WEB_PORT: 3000

volumes:
  pgdata:
