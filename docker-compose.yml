services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skizoai
      POSTGRES_PASSWORD: skizoai123
      POSTGRES_DB: akaribot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skizoai -d akaribot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    ports:
      - "3939:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://skizoai:skizoai123@postgres:5432/akaribot?sslmode=disable
      NODE_ENV: production
      WEB_PORT: 3000

volumes:
  pgdata:
